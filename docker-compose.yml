  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/education_db?schema=public
  #     PORT: 3333
  #     JWT_SECRET: change-me-in-production
  #     NODE_ENV: development
  #   ports:
  #     - "3333:3333"

volumes:
  postgres_data:
    driver: local
